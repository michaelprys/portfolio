<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <script>
            (function () {
                const d = document.documentElement;
                const saved = localStorage.getItem('theme-color') || 'auto';
                const dark = matchMedia('(prefers-color-scheme: dark)').matches;

                const theme = saved === 'auto' ? (dark ? 'theme-mora' : 'theme-aura') : saved;

                d.classList.add(theme);
                d.style.colorScheme = theme === 'theme-aura' ? 'light' : 'dark';
            })();
        </script>

        <style>
            html,
            body {
                margin: 0;
                background: #080808;
            }
        </style>

        <link rel="icon" href="/favicon.ico" />

        <link
            rel="preload"
            href="/fonts/Gotham-Bold.woff2"
            as="font"
            type="font/woff2"
            crossorigin />
        <link
            rel="preload"
            href="/fonts/Gotham-Book.woff2"
            as="font"
            type="font/woff2"
            crossorigin />
        <link
            rel="preload"
            href="/fonts/Gotham-Medium.woff2"
            as="font"
            type="font/woff2"
            crossorigin />
        <link
            rel="preload"
            href="/fonts/RetroSignatureRegular.woff2"
            as="font"
            type="font/woff2"
            crossorigin />
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
